name: Verify Public GitHub Preview

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag dạng vX.Y.Z-preview.N cần xác minh public
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: verify-public-preview-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  verify:
    name: Public metadata, provenance, assets and SHA-256
    if: contains(github.event.release.tag_name || inputs.release_tag, '-preview.')
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Xác minh release như người dùng chưa đăng nhập
        run: >-
          scripts/agent/verify_github_preview_release.sh
          "$RELEASE_TAG"
          "$GITHUB_REPOSITORY"
