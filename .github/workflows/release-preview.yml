name: GitHub Preview Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag dạng vX.Y.Z-preview.N đã có CI push thành công
        required: true
        type: string
      confirmation:
        description: Nhập PUBLISH_UNSIGNED_GITHUB_PREVIEW để xác nhận phát hành unsigned
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: github-preview-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Xác minh CI và publish unsigned preview
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}
      - name: Publish GitHub Preview từ artifact đã vượt CI theo tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_CONFIRMATION: ${{ inputs.confirmation }}
        run: >-
          scripts/agent/github_preview_release.sh
          "$RELEASE_TAG"
          "$RELEASE_CONFIRMATION"
