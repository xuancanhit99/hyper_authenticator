name: hyper_authenticator
description: Ứng dụng xác thực TOTP đa nền tảng.
publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  bloc: ^9.2.1
  cupertino_icons: ^1.0.9
  equatable: ^2.1.0
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.3.1
  flutter_slidable: ^4.0.3
  fpdart: ^1.2.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  image_picker: ^1.2.3
  injectable: ^3.0.0
  intl: ^0.20.3
  local_auth: ^3.0.2
  mobile_scanner: ^7.3.0
  otp: ^3.2.0
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.16.0
  uuid: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  injectable_generator: ^3.1.0
  rename: ^3.1.0

flutter_native_splash:
  color: "#ffffff"
  image: assets/logos/hyper-logo-green-non-bg-alt.png
  color_dark: "#000000"
  image_dark: assets/logos/hyper-logo-green-non-bg-alt.png
  android_12:
    image: assets/logos/android12splash-hyper-alt.png
    image_dark: assets/logos/android12splash-hyper-alt.png
  web: false
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/
    - assets/logos/authenticators/
    - assets/data/authenticator_logo_map.json
  fonts:
    - family: Averta
      fonts:
        - asset: assets/fonts/averta.ttf

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/logos/hyper-logo-green-black.png
  min_sdk_android: 21
  windows:
    generate: true
    image_path: assets/logos/hyper-logo-green-black.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/logos/hyper-logo-green-black.png
