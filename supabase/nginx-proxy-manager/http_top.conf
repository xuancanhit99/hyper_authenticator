# Hyper Authenticator production observability.
# Installed as /data/nginx/custom/http_top.conf in Nginx Proxy Manager.
# This intentionally logs only timing metadata for the public Auth health route.

map "$host$request_uri" $hyper_auth_supabase_health_timing_enabled {
  default 0;
  supabase-api.vnpay.dev/auth/v1/health 1;
}

log_format hyper_auth_supabase_timing escape=json
  '{"time":"$time_iso8601",'
  '"request_id":"$request_id",'
  '"status":"$status",'
  '"request_time":"$request_time",'
  '"upstream_status":"$upstream_status",'
  '"upstream_connect_time":"$upstream_connect_time",'
  '"upstream_header_time":"$upstream_header_time",'
  '"upstream_response_time":"$upstream_response_time"}';
