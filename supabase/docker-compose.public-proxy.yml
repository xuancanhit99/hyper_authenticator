services:
  kong:
    ports: !override
      - "127.0.0.1:${KONG_HTTP_PORT}:8000/tcp"
      - "127.0.0.1:${KONG_HTTPS_PORT}:8443/tcp"
    networks:
      - default
      - public-proxy

  supavisor:
    ports: !override
      - "127.0.0.1:${POOLER_SESSION_HOST_PORT:-54322}:5432/tcp"
      - "127.0.0.1:${POOLER_TRANSACTION_HOST_PORT:-6543}:6543/tcp"

networks:
  public-proxy:
    external: true
    name: proxy-network
