<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>Đặt lại mật khẩu - Hyper Authenticator</title>
    <link rel="stylesheet" href="/style.css">
    <script defer src="/env-config.js"></script>
    <script
        defer
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7/dist/umd/supabase.min.js"
        integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5"
        crossorigin="anonymous"></script>
    <script defer src="/script.js"></script>
</head>
<body>
    <main class="container">
        <img src="/logo.png" alt="" class="logo" width="100" height="100">
        <h1>Đặt mật khẩu mới</h1>
        <p id="instructions">Chỉ tiếp tục nếu bạn mở trang này từ email khôi phục của Hyper Authenticator.</p>
        <p id="message" class="message" role="status" aria-live="polite" hidden></p>

        <form id="reset-password-form" autocomplete="off">
            <div class="input-group">
                <label for="password">Mật khẩu mới</label>
                <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" disabled>
            </div>
            <div class="input-group">
                <label for="confirm-password">Nhập lại mật khẩu mới</label>
                <input type="password" id="confirm-password" name="confirm-password" required minlength="6" autocomplete="new-password" disabled>
            </div>
            <button type="submit" id="submit-button" disabled>Cập nhật mật khẩu</button>
        </form>
    </main>
</body>
</html>
