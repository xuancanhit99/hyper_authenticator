<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <title>Đặt lại mật khẩu Hyper Authenticator</title>
  </head>
  <body>
    <h2>Đặt lại mật khẩu</h2>
    <p>Bạn vừa yêu cầu đặt lại mật khẩu Hyper Authenticator.</p>
    <p>
      <a href="{{ .RedirectTo }}#token_hash={{ .TokenHash }}&amp;type=recovery">
        Chọn mật khẩu mới
      </a>
    </p>
    <p>Nếu bạn không yêu cầu thao tác này, hãy bỏ qua email.</p>
  </body>
</html>
