services:
  reset-password-web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SUPABASE_URL: ${SUPABASE_URL:?Thiếu SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    ports:
      - "127.0.0.1:${RESET_PASSWORD_PORT:-8888}:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=1m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz | grep -qx healthy"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
